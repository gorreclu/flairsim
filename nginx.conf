# FlairSim -- Nginx reverse proxy configuration.
#
# This config is for standalone deployment (not needed with Coolify,
# which handles its own reverse proxy and SSL termination).
#
# Place this at /etc/nginx/conf.d/flairsim.conf on the host,
# or mount it via docker-compose.

upstream flairsim {
    server 127.0.0.1:8000;
}

# Redirect HTTP to HTTPS.
server {
    listen 80;
    server_name flairsim.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flairsim.example.com;

    # SSL certificates (Let's Encrypt via certbot).
    ssl_certificate     /etc/letsencrypt/live/flairsim.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flairsim.example.com/privkey.pem;

    # Modern TLS settings.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to the FlairSim orchestrator.
    location / {
        proxy_pass http://flairsim;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering so events stream immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Long timeout for SSE connections.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static assets: allow browser caching.
    location /static/ {
        proxy_pass http://flairsim;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # Let's Encrypt ACME challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
